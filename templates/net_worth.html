<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Net Worth Tracker · FinGlass</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg" />
    <link rel="stylesheet" href="/static/css/base.css" />
    <link rel="stylesheet" href="/static/css/layout.css" />
    <link rel="stylesheet" href="/static/css/forms.css" />
    <link rel="stylesheet" href="/static/css/buttons.css" />
    <link rel="stylesheet" href="/static/css/tables.css" />
    <link rel="stylesheet" href="/static/css/components.css" />
    <link rel="stylesheet" href="/static/css/theme.css" />
    <link rel="stylesheet" href="/static/css/responsive.css" />
  </head>
  <body>
    <main class="container">
      <header class="page-header row">
        <div>
          <h1>Net Worth Tracker</h1>
          <p class="muted">Add, edit, and remove net worth entries over time.</p>
        </div>
        <div class="header-actions">
          <div class="user-profile-wrap">
            <span
              id="userProfileAdminBadge"
              class="user-admin-badge"
              aria-hidden="true"
              title="Superadmin"
              {% if not request.user.is_superuser %} hidden{% endif %}
            ><span class="admin-badge-emoji">🛡</span><span class="admin-badge-text">Admin</span></span>
            <button id="userProfileBtn" type="button" class="btn-user-profile" aria-label="User menu" aria-expanded="false" aria-controls="userProfileMenu">
              <span id="userProfileUsername">{{ request.user.username }}</span>
              <span class="profile-caret">▼</span>
            </button>
            <div id="userProfileMenu" class="user-profile-menu hidden" aria-hidden="true">
              {% if request.user.is_superuser %}<button id="adminDashboardBtn" type="button" class="menu-item"><span class="menu-icon">⚙</span><span class="menu-label">Admin Panel</span></button>{% endif %}
              <button id="logoutMenuBtn" type="button" class="menu-item"><span class="menu-icon">🚪</span><span class="menu-label">Logout</span></button>
            </div>
          </div>
          <a class="btn-link btn-secondary" href="/">← Back to Overview</a>
        </div>
      </header>

      <section class="card">
        <h2>Edit Entries</h2>
        <form id="netWorthForm" class="row net-worth-form" autocomplete="off">
          <label>
            Date
            <input id="netWorthDate" type="date" required />
          </label>
          <label>
            Net Worth (CAD)
            <input id="netWorthAmount" type="number" step="0.01" required />
          </label>
          <label>
            Note (optional)
            <input id="netWorthNote" type="text" placeholder="Salary increase, bonus, market drop..." />
          </label>
          <button id="saveNetWorthBtn" type="submit">Add Entry</button>
          <button id="cancelNetWorthEditBtn" class="btn-secondary hidden" type="button">Cancel Edit</button>
        </form>

        <div class="chart-card net-worth-chart-wrap">
          <h3>Net Worth Over Time</h3>
          <canvas id="netWorthChart"></canvas>
        </div>

        <div class="table-wrap">
          <table id="netWorthTable">
            <thead>
              <tr>
                <th>Date</th>
                <th>Net Worth (CAD)</th>
                <th>Note</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </section>

      <p id="status" class="muted"></p>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
    <script src="/static/common.js?v=20260305-globalmotion"></script>
    <script src="/static/user_profile_menu.js"></script>
    <script src="/static/net_worth.js"></script>
  </body>
</html>
