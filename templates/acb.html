<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ACB Tracker · FinGlass</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg" />
    <link rel="stylesheet" href="/static/css/base.css" />
    <link rel="stylesheet" href="/static/css/layout.css" />
    <link rel="stylesheet" href="/static/css/forms.css" />
    <link rel="stylesheet" href="/static/css/buttons.css" />
    <link rel="stylesheet" href="/static/css/tables.css" />
    <link rel="stylesheet" href="/static/css/components.css" />
    <link rel="stylesheet" href="/static/css/theme.css" />
    <link rel="stylesheet" href="/static/css/responsive.css" />
  </head>
  <body>
    <main class="container">
      <header class="page-header row">
        <div>
          <h1>ACB Tracker</h1>
          <p class="muted">Add ACB transactions and open any security for full transaction editing.</p>
        </div>
        <a class="btn-link" href="/">← Back to Overview</a>
      </header>

      <section class="card">
        <h2>Add Transaction</h2>
        <form id="acbQuickForm" class="form-grid" autocomplete="off">
          <label>Security
            <input id="acbSecurity" type="text" required placeholder="e.g. XEQT" />
          </label>
          <label>Date
            <input id="acbDate" type="date" required />
          </label>
          <label>Type
            <select id="acbTypeSelect" required></select>
          </label>
          <label>Amount
            <input id="acbAmount" type="number" step="0.0001" required />
          </label>
          <label>Shares
            <input id="acbShares" type="number" step="0.000001" required />
          </label>
          <label>Commission
            <input id="acbCommission" type="number" step="0.0001" value="0" />
          </label>
          <div class="span-2 row">
            <button type="submit">Save Transaction</button>
            <button id="acbRefreshBtn" type="button" class="btn-secondary">Refresh</button>
          </div>
        </form>
      </section>

      <section class="card">
        <h2>Securities</h2>
        <p class="muted">Use Open to manage full transaction history for a specific security.</p>
        <div class="table-wrap">
          <table id="acbSecuritiesTable">
            <thead>
              <tr>
                <th>Security</th>
                <th>Shares</th>
                <th>ACB</th>
                <th>ACB/Share</th>
                <th>Realized Gain</th>
                <th>Transactions</th>
                <th>Open</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </section>

      <p id="status" class="muted"></p>
    </main>

    <script src="/static/common.js"></script>
    <script src="/static/acb.js"></script>
  </body>
</html>
