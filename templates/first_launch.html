<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>First Launch Setup · FinGlass</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg" />
    <link rel="stylesheet" href="/static/css/base.css" />
    <link rel="stylesheet" href="/static/css/layout.css" />
    <link rel="stylesheet" href="/static/css/forms.css" />
    <link rel="stylesheet" href="/static/css/buttons.css" />
    <link rel="stylesheet" href="/static/css/tables.css" />
    <link rel="stylesheet" href="/static/css/components.css" />
    <link rel="stylesheet" href="/static/css/theme.css" />
    <link rel="stylesheet" href="/static/css/responsive.css" />
  </head>
  <body>
    <main class="container auth-container">
      <header class="page-header">
        <div>
          <h1>FinGlass</h1>
          <p class="muted">Welcome! Let's set up your account.</p>
        </div>
      </header>

      <section class="card auth-card">
        <h2>Create Admin Account</h2>
        <p class="muted" id="stepDescription">This is the first user. You'll be set as the administrator.</p>

        <form id="setupForm" class="form-grid" autocomplete="on">
          <label>
            Username
            <input
              id="setupUsername"
              name="username"
              type="text"
              required
              autocomplete="username"
              placeholder="Enter your username"
            />
          </label>
          <label>
            Password
            <input
              id="setupPassword"
              name="password"
              type="password"
              required
              minlength="8"
              autocomplete="new-password"
              placeholder="At least 8 characters"
            />
          </label>
          <label>
            Confirm Password
            <input
              id="setupPasswordConfirm"
              name="passwordConfirm"
              type="password"
              required
              minlength="8"
              autocomplete="new-password"
              placeholder="Confirm your password"
            />
          </label>
          <div id="errorMessage" class="error-message hidden"></div>
          <div class="span-2">
            <button type="submit" id="submitBtn">Create Admin Account</button>
          </div>
        </form>

        <div id="successMessage" class="success-message hidden">
          <p>✓ Admin account created successfully!</p>
          <p class="muted">Redirecting to dashboard...</p>
        </div>
      </section>

      <div class="form-footer">
        <p class="muted">FinGlass • Financial Dashboard</p>
      </div>
    </main>

    <script src="/static/common.js"></script>
    <script>
      function showError(message) {
        const errorEl = document.getElementById('errorMessage');
        errorEl.textContent = message;
        errorEl.classList.remove('hidden');
      }

      function hideError() {
        const errorEl = document.getElementById('errorMessage');
        errorEl.textContent = '';
        errorEl.classList.add('hidden');
      }

      function showSuccess() {
        const form = document.getElementById('setupForm');
        const successMsg = document.getElementById('successMessage');
        form.classList.add('hidden');
        successMsg.classList.remove('hidden');
      }

      document.getElementById('setupForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        hideError();

        const username = document.getElementById('setupUsername').value.trim();
        const password = document.getElementById('setupPassword').value;
        const passwordConfirm = document.getElementById('setupPasswordConfirm').value;

        if (!username || !password) {
          showError('Username and password are required');
          return;
        }

        if (password !== passwordConfirm) {
          showError('Passwords do not match');
          return;
        }

        if (password.length < 8) {
          showError('Password must be at least 8 characters');
          return;
        }

        const submitBtn = document.getElementById('submitBtn');
        submitBtn.disabled = true;
        submitBtn.textContent = 'Setting up...';

        try {
          await window.FinGlassCommon.fetchJson('/api/auth/setup-superuser', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password }),
          });

          showSuccess();
          setTimeout(() => {
            window.location.href = '/';
          }, 1500);
        } catch (err) {
          showError(err?.message || 'An error occurred. Please try again.');
          submitBtn.disabled = false;
          submitBtn.textContent = 'Create Admin Account';
        }
      });
    </script>
  </body>
</html>
