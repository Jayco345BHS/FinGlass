services:
  finglass-web:
    build: .
    container_name: finglass-web
    command: >
      sh -c "python manage.py migrate &&
      python manage.py runserver 0.0.0.0:8000"
    ports:
      - "8000:8000"
    volumes:
      - ./:/app
      - ./data:/app/data
    environment:
      - DJANGO_DEBUG=1
      - ALLOWED_HOSTS=localhost,127.0.0.1
