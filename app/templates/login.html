<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login · FinGlass</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg" />
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="container auth-container">
      <header class="page-header">
        <div>
          <h1>FinGlass</h1>
          <p class="muted">Sign in or create an account to continue.</p>
        </div>
      </header>

      <section class="card auth-card">
        <h2 id="authModeTitle">Login</h2>
        <form id="loginForm" class="form-grid" autocomplete="on">
          <label>
            Username
            <input id="loginUsername" name="username" type="text" required autocomplete="username" />
          </label>
          <label>
            Password
            <input id="loginPassword" name="password" type="password" required autocomplete="current-password" />
          </label>
          <div class="span-2">
            <button type="submit">Login</button>
          </div>
        </form>

        <form id="registerForm" class="form-grid hidden" autocomplete="on">
          <label>
            Username
            <input id="registerUsername" name="username" type="text" required autocomplete="username" />
          </label>
          <label>
            Password
            <input id="registerPassword" name="password" type="password" required minlength="8" autocomplete="new-password" />
          </label>
          <div class="span-2">
            <button type="submit">Create Account</button>
          </div>
        </form>

        <div class="row" style="margin-top:0.5rem;">
          <button id="showRegisterBtn" type="button">Create Account Instead</button>
          <button id="showLoginBtn" type="button" class="hidden">Back to Login</button>
        </div>
      </section>

      <p id="status" class="muted"></p>
    </main>

    <script>
      const statusEl = document.getElementById("status");
      const authModeTitleEl = document.getElementById("authModeTitle");
      const loginFormEl = document.getElementById("loginForm");
      const registerFormEl = document.getElementById("registerForm");
      const showRegisterBtnEl = document.getElementById("showRegisterBtn");
      const showLoginBtnEl = document.getElementById("showLoginBtn");

      function setStatus(message) {
        statusEl.textContent = message || "";
        statusEl.classList.remove("status-error");
      }

      function setErrorStatus(message) {
        statusEl.textContent = message || "";
        statusEl.classList.add("status-error");
      }

      function setAuthMode(mode) {
        const isRegister = mode === "register";
        authModeTitleEl.textContent = isRegister ? "Create Account" : "Login";
        loginFormEl.classList.toggle("hidden", isRegister);
        registerFormEl.classList.toggle("hidden", !isRegister);
        showRegisterBtnEl.classList.toggle("hidden", isRegister);
        showLoginBtnEl.classList.toggle("hidden", !isRegister);
        setStatus("");
      }

      async function postJson(url, body) {
        const res = await fetch(url, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body),
        });
        if (!res.ok) {
          const error = await res.json().catch(() => ({ error: "Request failed" }));
          throw new Error(error.error || `HTTP ${res.status}`);
        }
        return res.json();
      }

      document.getElementById("loginForm").addEventListener("submit", async (event) => {
        event.preventDefault();
        const username = document.getElementById("loginUsername").value.trim();
        const password = document.getElementById("loginPassword").value;

        try {
          await postJson("/api/auth/login", { username, password });
          window.location.assign("/");
        } catch (error) {
          setErrorStatus(error.message);
        }
      });

      document.getElementById("registerForm").addEventListener("submit", async (event) => {
        event.preventDefault();
        const username = document.getElementById("registerUsername").value.trim();
        const password = document.getElementById("registerPassword").value;

        try {
          await postJson("/api/auth/register", { username, password });
          window.location.assign("/");
        } catch (error) {
          setErrorStatus(error.message);
        }
      });

      showRegisterBtnEl.addEventListener("click", () => {
        setAuthMode("register");
      });

      showLoginBtnEl.addEventListener("click", () => {
        setAuthMode("login");
      });

      setAuthMode("login");
    </script>
  </body>
</html>
