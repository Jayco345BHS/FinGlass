<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Holdings Editor · FinGlass</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg" />
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="container">
      <header class="page-header row">
        <div>
          <h1>Holdings Editor</h1>
          <p class="muted">Add, edit, and delete investment account holdings without importing files.</p>
        </div>
        <a class="btn-link" href="/">← Back to Overview</a>
      </header>

      <section class="card">
        <h2>Edit Holdings Rows</h2>
        <p id="holdingsAsOf" class="muted"></p>

        <form id="holdingsForm" class="form-grid" autocomplete="off">
          <label>Account Name
            <input id="holdingAccountName" type="text" required />
          </label>
          <label>Account Type
            <select id="holdingAccountType">
              <option value="">Select type</option>
              <option value="Cash">Cash</option>
              <option value="FHSA">FHSA</option>
              <option value="Non-registered">Non-registered</option>
              <option value="RRSP">RRSP</option>
              <option value="TFSA">TFSA</option>
            </select>
          </label>
          <label>Account Classification
            <input id="holdingAccountClassification" type="text" />
          </label>
          <label>Symbol
            <input id="holdingSymbol" type="text" required autocomplete="off" placeholder="e.g. XEQT" />
          </label>
          <label>Security Name
            <input id="holdingSecurityName" type="text" />
          </label>
          <label>Quantity
            <input id="holdingQuantity" type="number" step="0.000001" required />
          </label>
          <label>Book Value (CAD)
            <input id="holdingBookValue" type="number" step="0.01" required />
          </label>
          <label>Market Value
            <input id="holdingMarketValue" type="number" step="0.01" required />
          </label>
          <div class="row span-2 holdings-actions-row">
            <button id="saveHoldingBtn" type="submit">Add Holding</button>
            <button id="cancelHoldingEditBtn" type="button" class="hidden">Cancel Edit</button>
            <button id="getHoldingPriceBtn" type="button">Get Price</button>
            <button id="refreshHoldingPricesBtn" type="button">Refresh Snapshot Prices</button>
            <button id="refreshHoldingBtn" type="button">Refresh</button>
          </div>
        </form>

        <div class="table-wrap">
          <table id="holdingsTable">
            <thead>
              <tr>
                <th>As Of</th>
                <th>Account</th>
                <th>Type</th>
                <th>Classification</th>
                <th>Symbol</th>
                <th>Security</th>
                <th>Quantity</th>
                <th>Book Value</th>
                <th>Market Value</th>
                <th>Unrealized</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </section>

      <p id="status" class="muted"></p>
    </main>

    <script src="/static/holdings.js"></script>
  </body>
</html>
