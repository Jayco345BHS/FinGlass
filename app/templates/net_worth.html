<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Net Worth Tracker · FinGlass</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="container">
      <header class="page-header row">
        <div>
          <h1>Net Worth Tracker</h1>
          <p class="muted">Add, edit, and remove net worth entries over time.</p>
        </div>
        <a class="btn-link" href="/">← Back to Overview</a>
      </header>

      <section class="card">
        <h2>Edit Entries</h2>
        <form id="netWorthForm" class="row net-worth-form" autocomplete="off">
          <label>
            Date
            <input id="netWorthDate" type="date" required />
          </label>
          <label>
            Net Worth (CAD)
            <input id="netWorthAmount" type="number" step="0.01" required />
          </label>
          <label class="span-2">
            Note (optional)
            <input id="netWorthNote" type="text" placeholder="Salary increase, bonus, market drop..." />
          </label>
          <button id="saveNetWorthBtn" type="submit">Add Entry</button>
          <button id="cancelNetWorthEditBtn" class="hidden" type="button">Cancel Edit</button>
        </form>

        <div class="chart-card net-worth-chart-wrap">
          <h3>Net Worth Over Time</h3>
          <canvas id="netWorthChart"></canvas>
        </div>

        <div class="table-wrap">
          <table id="netWorthTable">
            <thead>
              <tr>
                <th>Date</th>
                <th>Net Worth (CAD)</th>
                <th>Note</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </section>

      <p id="status" class="muted"></p>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
    <script src="/static/net_worth.js"></script>
  </body>
</html>
