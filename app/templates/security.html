<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ security }} · FinGlass</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg" />
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="container">
      <header class="page-header row">
        <div>
          <h1>{{ security }}</h1>
          <p class="muted">Security detail and transaction editing.</p>
        </div>
        <a class="btn-link" href="/">← Back to Overview</a>
      </header>

      <section class="card">
        <h2>Add Transaction</h2>
        <form id="txForm" class="form-grid">
          <label>Security <input name="security" required value="{{ security }}" /></label>
          <label>Date <input type="date" name="trade_date" required /></label>
          <label>Type
            <select name="transaction_type" required id="txTypeSelect"></select>
          </label>
          <label>Amount <input type="number" step="0.0001" name="amount" required /></label>
          <label>Shares <input type="number" step="0.000001" name="shares" required /></label>
          <label>Commission <input type="number" step="0.0001" name="commission" value="0" /></label>
          <div class="span-2">
            <button type="submit">Save Transaction</button>
          </div>
        </form>
      </section>

      <section class="card">
        <h2>Transactions</h2>
        <div class="row">
          <button id="refreshBtn">Refresh</button>
          <button id="deleteSelectedBtn">Delete Selected</button>
        </div>
        <div class="table-wrap">
          <table id="transactionsTable">
            <thead>
              <tr>
                <th><input id="selectAllTransactions" type="checkbox" /></th>
                <th>ID</th>
                <th>Date</th>
                <th>Security</th>
                <th>Type</th>
                <th>Amount</th>
                <th>Shares</th>
                <th>Commission</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </section>

      <section class="card">
        <h2>ACB Ledger (Calculated)</h2>
        <div class="table-wrap">
          <table id="ledgerTable">
            <thead>
              <tr>
                <th>Date</th>
                <th>Type</th>
                <th>Amount</th>
                <th>Shares</th>
                <th>Commission</th>
                <th>Balance</th>
                <th>ACB</th>
                <th>ACB/Share</th>
                <th>Cap Gain</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </section>

      <p id="status" class="muted"></p>
    </main>

    <script>
      window.currentSecurity = "{{ security }}";
    </script>
    <script src="/static/security.js"></script>
  </body>
</html>
